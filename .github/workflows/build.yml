        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/curl-linux-${{ matrix.arch }}' artifact-root/bin/curl
          cp 'dist/metadata/curl-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/curl.buildinfo.txt

