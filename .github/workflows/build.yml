          cp 'dist/bin/dig-linux-${{ matrix.arch }}' artifact-root/bin/dig
          cp 'dist/metadata/dig-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/dig.buildinfo.txt

      - name: Upload dig artifact
        uses: actions/upload-artifact@v7
        with:
