      - name: Upload socat artifact
        uses: actions/upload-artifact@v7
        with:
          name: socat-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

  build-openssl:
    name: openssl (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out OpenSSL submodule
        run: git submodule update --init --recursive upstream/openssl

      - name: Fetch OpenSSL tags
        run: git -C upstream/openssl fetch --tags --force origin

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build OpenSSL
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-openssl-alpine.sh

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/openssl-linux-${{ matrix.arch }}' artifact-root/bin/openssl
          cp 'dist/metadata/openssl-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/openssl.buildinfo.txt

      - name: Upload OpenSSL artifact
        uses: actions/upload-artifact@v7
        with:
          name: openssl-linux-${{ matrix.arch }}
          if-no-files-found: error
