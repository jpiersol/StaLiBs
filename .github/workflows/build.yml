name: Build static binaries

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-tcpdump:
    name: tcpdump (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out tcpdump submodules
        run: git submodule update --init --recursive upstream/tcpdump upstream/libpcap

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build tcpdump
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}'

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/tcpdump-linux-${{ matrix.arch }}' artifact-root/bin/tcpdump
          cp 'dist/metadata/tcpdump-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/tcpdump.buildinfo.txt

      - name: Upload tcpdump artifact
        uses: actions/upload-artifact@v7
        with:
          name: tcpdump-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

  build-strace:
    name: strace (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out strace submodule
        run: git submodule update --init --recursive upstream/strace

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build strace
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-strace-alpine.sh

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/strace-linux-${{ matrix.arch }}' artifact-root/bin/strace
          cp 'dist/metadata/strace-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/strace.buildinfo.txt

      - name: Upload strace artifact
        uses: actions/upload-artifact@v7
        with:
          name: strace-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

