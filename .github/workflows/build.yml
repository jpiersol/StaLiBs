      - name: Check out nmap submodule
        run: git submodule update --init --recursive upstream/nmap

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build nmap
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-nmap-alpine.sh

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata artifact-root/share
          cp 'dist/bin/nmap-linux-${{ matrix.arch }}' artifact-root/bin/nmap
          cp 'dist/metadata/nmap-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/nmap.buildinfo.txt
          cp -a dist/share/nmap artifact-root/share/nmap

      - name: Upload nmap artifact
        uses: actions/upload-artifact@v7
        with:
          name: nmap-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

  package:
    name: Package bundle (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    needs:
      - build-tcpdump
      - build-strace
      - build-gdb
      - build-nmap
      - build-jq
      - build-curl
      - build-openssl
      - build-socat
      - build-dig
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - armv7
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download tcpdump artifact
        uses: actions/download-artifact@v8
        with:
          name: tcpdump-linux-${{ matrix.arch }}
          path: package-root/tcpdump

      - name: Download strace artifact
        uses: actions/download-artifact@v8
        with:
          name: strace-linux-${{ matrix.arch }}
          path: package-root/strace

      - name: Download gdb artifact
        uses: actions/download-artifact@v8
        with:
          name: gdb-linux-${{ matrix.arch }}
          path: package-root/gdb

      - name: Download nmap artifact
        uses: actions/download-artifact@v8
        with:
          name: nmap-linux-${{ matrix.arch }}
          path: package-root/nmap

      - name: Download jq artifact
        uses: actions/download-artifact@v8
        with:
          name: jq-linux-${{ matrix.arch }}
          path: package-root/jq

      - name: Download curl artifact
        uses: actions/download-artifact@v8
        with:
          name: curl-linux-${{ matrix.arch }}
          path: package-root/curl

      - name: Download OpenSSL artifact
        uses: actions/download-artifact@v8
        with:
          name: openssl-linux-${{ matrix.arch }}
          path: package-root/openssl

      - name: Download socat artifact
        uses: actions/download-artifact@v8
        with:
          name: socat-linux-${{ matrix.arch }}
          path: package-root/socat

      - name: Download dig artifact
        uses: actions/download-artifact@v8
        with:
          name: dig-linux-${{ matrix.arch }}
          path: package-root/dig

      - name: List downloaded artifacts
        run: find package-root -maxdepth 4 -type f -print | sort

      - name: Package platform zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="tcpdump-${GITHUB_SHA::12}"
          fi

          ./scripts/package-platform.sh '${{ matrix.arch }}' "$version" package-root dist

      - name: Upload platform bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: stalibs-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.zip_path }}

      - name: Attest platform bundle provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.package.outputs.zip_path }}

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-24.04
    needs:
      - package
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch upstream tags for release notes
        run: |
          git -C upstream/gdb fetch --tags --force origin
          git -C upstream/jq fetch --tags --force origin
          git -C upstream/curl fetch --tags --force origin
          git -C upstream/openssl fetch --tags --force origin
          git -C upstream/socat fetch --tags --force origin
          git -C upstream/bind9 fetch --tags --force origin

      - name: Download platform bundle artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: stalibs-linux-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/write-release-notes.sh "$TAG" > release-notes.md

          mapfile -t zip_files < <(find release-assets -maxdepth 1 -type f -name '*.zip' | sort)
          if [[ "${#zip_files[@]}" -eq 0 ]]; then
            echo "No platform zip assets found." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${zip_files[@]}" --clobber
          else
            gh release create "$TAG" "${zip_files[@]}" \
              --title "StaLiBs $TAG" \
              --notes-file release-notes.md
          fi
