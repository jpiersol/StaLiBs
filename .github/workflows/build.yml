    name: jq (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out jq submodules
        run: git submodule update --init --recursive upstream/jq

      - name: Fetch jq tags
        run: git -C upstream/jq fetch --tags --force origin

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build jq
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-jq-alpine.sh

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/jq-linux-${{ matrix.arch }}' artifact-root/bin/jq
          cp 'dist/metadata/jq-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/jq.buildinfo.txt

