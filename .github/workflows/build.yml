    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out BIND submodule
        run: git submodule update --init --recursive upstream/bind9

      - name: Fetch BIND tags
        run: git -C upstream/bind9 fetch --tags --force origin

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build dig
        env:
