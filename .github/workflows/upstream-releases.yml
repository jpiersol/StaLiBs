name: Check upstream releases

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    name: Check tcpdump/libpcap releases
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Update submodules to latest stable upstream tags
        id: update
        run: ./scripts/update-upstream-tags.sh

      - name: Open or update PR
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TCPDUMP_TAG: ${{ steps.update.outputs.tcpdump_tag }}
          LIBPCAP_TAG: ${{ steps.update.outputs.libpcap_tag }}
        shell: bash
        run: |
          set -euo pipefail

          branch="automation/update-${TCPDUMP_TAG}"
          title="Update tcpdump to ${TCPDUMP_TAG}"
          body_file="/tmp/upstream-update-pr.md"

          cat > "$body_file" <<EOF_BODY
          Updates upstream submodules to the latest stable release tags detected by CI.

          - tcpdump: \`${TCPDUMP_TAG}\`
          - libpcap: \`${LIBPCAP_TAG}\`

          After this PR is merged, create and push a StaLiBs release tag that matches the upstream tcpdump tag:

          \`\`\`sh
          git tag -a ${TCPDUMP_TAG} -m "StaLiBs ${TCPDUMP_TAG}"
          git push origin ${TCPDUMP_TAG}
          \`\`\`
          EOF_BODY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "$branch"
          git commit -m "Update upstream tcpdump to ${TCPDUMP_TAG}"
          git push --force-with-lease origin "$branch"

          existing_pr="$(gh pr list --head "$branch" --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" --title "$title" --body-file "$body_file"
          else
            gh pr create --base main --head "$branch" --title "$title" --body-file "$body_file"
          fi
