      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build curl
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-curl-alpine.sh

