name: Build static binaries

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-tcpdump:
    name: tcpdump (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out tcpdump submodules
        run: git submodule update --init --recursive upstream/tcpdump upstream/libpcap

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build tcpdump
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}'

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/tcpdump-linux-${{ matrix.arch }}' artifact-root/bin/tcpdump
          cp 'dist/metadata/tcpdump-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/tcpdump.buildinfo.txt

      - name: Upload tcpdump artifact
        uses: actions/upload-artifact@v7
        with:
          name: tcpdump-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

  build-strace:
    name: strace (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out strace submodule
        run: git submodule update --init --recursive upstream/strace

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build strace
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-strace-alpine.sh

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/strace-linux-${{ matrix.arch }}' artifact-root/bin/strace
          cp 'dist/metadata/strace-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/strace.buildinfo.txt

      - name: Upload strace artifact
        uses: actions/upload-artifact@v7
        with:
          name: strace-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

  build-gdb:
    name: gdb (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
            qemu: true
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out gdb submodule
        run: git submodule update --init --recursive upstream/gdb

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Build gdb
        env:
          ALPINE_VERSION: '3.20'
          CFLAGS: -O3 -pipe
        run: ./scripts/ci-build-in-docker.sh '${{ matrix.arch }}' scripts/build-gdb-alpine.sh

      - name: Stage platform artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-root/bin artifact-root/metadata
          cp 'dist/bin/gdb-linux-${{ matrix.arch }}' artifact-root/bin/gdb
          cp 'dist/metadata/gdb-linux-${{ matrix.arch }}.buildinfo.txt' artifact-root/metadata/gdb.buildinfo.txt

      - name: Upload gdb artifact
        uses: actions/upload-artifact@v7
        with:
          name: gdb-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: artifact-root

  package:
    name: Package bundle (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    needs:
      - build-tcpdump
      - build-strace
      - build-gdb
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - armv7
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download tcpdump artifact
        uses: actions/download-artifact@v8
        with:
          name: tcpdump-linux-${{ matrix.arch }}
          path: package-root/tcpdump

      - name: Download strace artifact
        uses: actions/download-artifact@v8
        with:
          name: strace-linux-${{ matrix.arch }}
          path: package-root/strace

      - name: Download gdb artifact
        uses: actions/download-artifact@v8
        with:
          name: gdb-linux-${{ matrix.arch }}
          path: package-root/gdb

      - name: List downloaded artifacts
        run: find package-root -maxdepth 4 -type f -print | sort

      - name: Package platform zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="tcpdump-${GITHUB_SHA::12}"
          fi

          ./scripts/package-platform.sh '${{ matrix.arch }}' "$version" package-root dist

      - name: Upload platform bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: stalibs-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.zip_path }}

      - name: Attest platform bundle provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.package.outputs.zip_path }}

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-24.04
    needs:
      - package
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download platform bundle artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: stalibs-linux-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG" =~ ^tcpdump-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping release: $TAG is not a stable upstream tcpdump release tag."
            exit 0
          fi

          ./scripts/validate-release-tag.sh "$TAG"
          ./scripts/write-release-notes.sh "$TAG" > release-notes.md

          mapfile -t zip_files < <(find release-assets -maxdepth 1 -type f -name '*.zip' | sort)
          if [[ "${#zip_files[@]}" -eq 0 ]]; then
            echo "No platform zip assets found." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${zip_files[@]}" --clobber
          else
            gh release create "$TAG" "${zip_files[@]}" \
              --title "StaLiBs $TAG" \
              --notes-file release-notes.md
          fi
