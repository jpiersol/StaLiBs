  build-dig:
    name: dig (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            qemu: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            qemu: false
          - arch: armv7
            runner: ubuntu-24.04
